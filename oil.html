<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>에센셜 오일 테라피 (Pro)</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-color: #F9F7F2; 
      --card-bg: rgba(255, 255, 255, 0.96);
      --primary: #4A6C56;
      --primary-dark: #35503D;
      --accent: #D4A024;
      --text-main: #2C2C2C;
      --text-sub: #555555;
      --border-radius: 20px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --font-main: 'Pretendard', sans-serif;
      --font-hand: 'Nanum Pen Script', cursive;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=1200&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      font-family: var(--font-main);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.4;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      padding: 15px; /* 모바일 여백 축소 */
      display: flex;
      flex-direction: column;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 24px 20px; /* 카드 전체 패딩 축소 */
      position: relative;
      overflow-y: auto;
      min-height: 85vh;
      max-height: 95vh;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-shrink: 0; }
    .header-left h1 { font-family: var(--font-hand); font-size: 2rem; color: var(--primary); margin-bottom: 2px; line-height: 1.1; }
    .sub { font-size: 0.85rem; color: var(--text-sub); }
    .icon-btn { background: rgba(0,0,0,0.05); border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }

    .progress-area { margin-bottom: 16px; flex-shrink: 0; }
    .pill { display: inline-block; background: var(--primary); color: white; font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; font-weight: 600; }
    .bar { width: 100%; height: 5px; background: #EAEAEA; border-radius: 3px; overflow: hidden; }
    #barFill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }

    #mainContent { flex: 1; display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; overflow-y: auto; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 버튼 스타일 */
    .btn { padding: 12px 18px; border-radius: 12px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #F0F0F0; color: var(--text-main); }
    .btn.primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(74, 108, 86, 0.2); }
    .btn.danger { background: #fff; border: 1px solid #ffcccc; color: #d32f2f; }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice { background: #FFFFFF; border: 1px solid #EAEAEA; padding: 16px; border-radius: 14px; text-align: left; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .choice.clicked { background: var(--primary); color: white; border-color: var(--primary); }

    /* ★ Q1 네모 칸 크기 대폭 축소 (수정 핵심) ★ */
    .pref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 5px; }
    .pref-card { 
      background: #FFF; 
      border: 1px solid #EAEAEA; 
      border-radius: 12px; 
      padding: 10px; /* 내부 여백 축소 */
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
    }
    .pref-card.clicked { border-color: var(--primary); background: #EFF5F1; transform: scale(0.98); }
    
    .pref-img { 
      width: 75px;  /* 이미지 크기 축소 */
      height: 75px; 
      object-fit: contain; 
      margin-bottom: 6px; 
    }
    
    .pref-name { font-size: 0.9rem; font-weight: 700; color: var(--text-main); }
    .pref-desc { font-size: 0.7rem; color: #888; margin-top: 2px; }
    
    .q-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; word-break: keep-all; color: var(--text-main); line-height: 1.3; }
    .nav { margin-top: auto; padding-top: 15px; display: flex; gap: 8px; flex-shrink: 0;}
    .nav .btn { flex: 1; }

    /* 결과 및 레시피 스타일 생략 없이 유지 */
    .analysis-box { background: #F7FAF8; border-radius: 16px; padding: 18px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
    .analysis-title { font-weight: 700; font-size: 1rem; color: var(--primary); margin-bottom: 8px; }
    .analysis-text { font-size: 0.9rem; color: #555; line-height: 1.5; }
    
    #oil-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .oil-card { display: flex; flex-direction: column; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 14px; margin-left: 20px;   /* 왼쪽 여백 */  margin-right: 20px;  /* 오른쪽 여백 */}
    .oil-card.best { border: 2px solid var(--accent); background: #FFFEFA; transform: scale(1.02); }
    .oil-name-txt { font-weight: 700; font-size: 1rem; }

    .category-group { margin-bottom: 20px; }
    .category-header { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .oil-select-item { background: #fff; border: 1px solid #eaeaea; border-radius: 10px; padding: 10px 2px; text-align: center; font-size: 0.8rem; cursor: pointer; height: 50px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;}
    .oil-select-item.selected { background: var(--primary); color: white; }
    .warning-dot { position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; background: #FF9800; border-radius: 50%; }

    .recipe-box { background: #FFF; border: 2px dashed #AACCAE; padding: 15px; border-radius: 16px; margin-top: 15px;}
    .drop-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px dashed #ddd; font-size: 0.9rem; }
    .wide-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 0.95rem; margin-top: 10px; cursor: pointer; font-weight: bold; }
    .footer { margin-top: 25px; text-align: center; font-size: 0.7rem; color: #888; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="app">
      <header>
        <div class="header-left">
          <h1 id="pageTitle">에센셜 오일 테라피</h1>
          <div class="sub" id="pageSub">나만의 향기를 찾아 떠나는 여행</div>
        </div>
        <button class="icon-btn" onclick="location.href='index.html'">🏠</button>
      </header>
      
      <div class="progress-area">
          <div class="pill" id="stepPill">Home</div>
          <div class="bar"><div id="barFill"></div></div>

      <main id="mainContent"></main>

      <div class="footer">

        <div>* 9ml 롤온 용기 기준 (피부 안전 비율 준수)</div>
      </div>
    </div>
  </div>

        mainContent.innerHTML = `<div class="choices">
          <button class="choice" onclick="startOilQuiz()"><strong>1. 성향 분석 테스트</strong><div style="font-size:0.8rem; color:#888;">나에게 맞는 오일 찾기</div></button>
          <button class="choice" onclick="setView('oil_recipe_intro')"><strong>2. DIY 레시피 제작</strong><div style="font-size:0.8rem; color:#888;">원하는 향 조합하기</div></button>
        </div>`;
    } 
    else if (state.view === 'quiz_oil') renderOilQuiz();
    else if (state.view === 'oil_recipe_intro') renderRecipeIntro();
    else if (state.view === 'oil_recipe_manual') renderRecipeManual();
    else if (state.view === 'oil_recipe_auto') renderRecipeAuto();
  }

  function renderRecipeIntro() {
      setTitle("DIY 레시피", "Recipe");
      mainContent.innerHTML = `<div class="choices">
        <button class="choice" onclick="setView('oil_recipe_manual')"><strong>🖐️ 직접 고르기</strong></button>
        <button class="choice" onclick="checkAndGoAutoRecipe()"><strong>🤖 결과 기반 추천</strong></button>
      </div><div class="nav"><button class="btn" onclick="setView('menu')">메뉴로</button></div>`;
  }

  window.startOilQuiz = () => { state.view = 'quiz_oil'; state.oilStep = 0; state.oilTags = []; render(); };
  
  function renderOilQuiz() {
    const progress = (state.oilStep / OIL_QUESTIONS.length) * 100;
    setTimeout(() => { barFill.style.width = `${progress}%`; }, 50);
    if (state.oilStep >= OIL_QUESTIONS.length) { renderOilResult(); return; }
    const q = OIL_QUESTIONS[state.oilStep];
    setTitle(`질문 ${state.oilStep+1} / 7`, "Test");
    let html = `<h2 class="q-title">${q.q}</h2>`;
    if (q.id === "pref") {
      html += `<div class="pref-grid">${q.options.map(opt => `<div class="pref-card" onclick="handleOption(this,'${opt.tag}')"><img src="${opt.img}" class="pref-img"><div class="pref-name">${opt.text}</div></div>`).join("")}</div>`;
    } else {
      html += `<div class="choices">${q.options.map(opt => `<button class="choice" onclick="handleOption(this,'${Array.isArray(opt.tags) ? opt.tags.join(',') : opt.tag}')">${opt.text}</button>`).join("")}</div>`;
    }
    html += `<div class="nav"><button class="btn danger" onclick="setView('menu')">취소</button></div>`;
    mainContent.innerHTML = html;
  }

  window.handleOption = (el, tagData) => {
    if(state.isProcessing) return; state.isProcessing = true;
    el.classList.add('clicked');
    if(OIL_QUESTIONS[state.oilStep].id === "pref") state.userPreference = tagData;
    else state.oilTags.push(...tagData.split(','));
    state.oilStep++; setTimeout(render, 200);
  };

  function renderOilResult() {
    setTitle("분석 결과", "Result");
    let scored = OIL_DATA.map(o => {
        let score = 0;
        score += o.tags.filter(t => state.oilTags.includes(t)).length * 2;
        if (o.category === state.userPreference) score += 3;
        return { ...o, score: score + Math.random() };
    }).sort((a,b)=>b.score - a.score);
    state.top5ResultOils = scored.slice(0,5);
    const best = state.top5ResultOils[0];
    mainContent.innerHTML = `<section>
        <div class="analysis-box"><div class="analysis-title">추천: ${best.name}</div><div class="analysis-text">${best.desc}</div></div>
        <div id="oil-list">${state.top5ResultOils.map((oil,i) => `<div class="oil-card ${i===0?'best':''}"><strong>${i+1}. ${oil.name}</strong><div style="font-size:0.8rem;">${oil.scentDesc}</div></div>`).join('')}</div>
        <button class="wide-btn primary" onclick="checkAndGoAutoRecipe()">🧪 레시피 만들기</button>
        <div class="nav"><button class="btn" onclick="setView('menu')">처음으로</button></div>
    </section>`;
  }

  function renderRecipeManual() {
    setTitle("오일 선택", "Selection");
    let html = "";
    CATEGORY_ORDER.forEach(cat => {
        const oils = OIL_DATA.filter(o => o.category === cat);
        html += `<div class="category-group"><div class="category-header">${CATEGORY_NAMES[cat]}</div><div class="selection-grid">${oils.map(oil => `<div class="oil-select-item ${state.selectedRecipeOils.some(o => o.name === oil.name) ? 'selected' : ''}" onclick="toggleRecipeOil('${oil.name}')">${oil.name}${oil.isIrritant ? '<span class="warning-dot"></span>':''}</div>`).join('')}</div></div>`;
    });
    mainContent.innerHTML = html + `<button class="wide-btn primary" onclick="calcRecipe()">🌿 레시피 보기</button><div id="recipeResult"></div><div class="nav"><button class="btn" onclick="setView('menu')">취소</button></div>`;
  }

  function renderRecipeAuto() {
    setTitle("추천 선택", "Selection");
    mainContent.innerHTML = `<div class="selection-grid">${state.top5ResultOils.map(oil => `<div class="oil-select-item ${state.selectedRecipeOils.some(o => o.name === oil.name) ? 'selected' : ''}" onclick="toggleAutoRecipeOil('${oil.name}')">${oil.name}</div>`).join('')}</div><button class="wide-btn primary" onclick="runAutoRecommend()">✨ 자동 배합</button><div id="recipeResult"></div><div class="nav"><button class="btn" onclick="setView('menu')">이전</button></div>`;
  }

  window.toggleRecipeOil = (name) => { 
    const idx = state.selectedRecipeOils.findIndex(o => o.name === name);
    if(idx > -1) state.selectedRecipeOils.splice(idx,1);
    else if(state.selectedRecipeOils.length < 3) state.selectedRecipeOils.push(OIL_DATA.find(o => o.name === name));
    renderRecipeManual();
  };

  window.toggleAutoRecipeOil = (name) => {
    const idx = state.selectedRecipeOils.findIndex(o => o.name === name);
    if(idx > -1) state.selectedRecipeOils.splice(idx,1);
    else if(state.selectedRecipeOils.length < 3) state.selectedRecipeOils.push(OIL_DATA.find(o => o.name === name));
    renderRecipeAuto();
  };

  window.calcRecipe = () => { displayRecipeResult(state.selectedRecipeOils); };
  window.runAutoRecommend = () => {
      let p = [...state.selectedRecipeOils];
      while(p.length < 3) p.push(OIL_DATA.filter(o => !p.includes(o))[Math.floor(Math.random()*10)]);
      displayRecipeResult(p);
  };

  function displayRecipeResult(oils) {
    const res = document.getElementById('recipeResult');
    oils.sort((a,b) => ({"B":3,"M":2,"T":1}[b.note]) - ({"B":3,"M":2,"T":1}[a.note]));
    let drops = oils.length === 3 ? [8,6,4] : oils.length === 2 ? [10,8] : [18];
    let rows = oils.map((o,i) => `<div class="drop-row"><span>${o.name} (${o.note})</span><strong>${o.isIrritant && drops[i]>6 ? 6 : drops[i]}방울</strong></div>`).join('');
    res.innerHTML = `<div class="recipe-box"><h3 style="text-align:center; color:var(--primary);">🧪 블렌딩 레시피</h3>${rows}<div style="text-align:center; margin-top:10px; font-size:0.8rem;">나머지: 캐리어 오일로 채우기</div></div><button class="wide-btn" onclick="captureResult('recipeResult','MyRecipe')">📷 저장하기</button>`;
    res.scrollIntoView({ behavior: 'smooth' });
  }

  window.checkAndGoAutoRecipe = () => { if(!state.top5ResultOils.length) alert("테스트 필수!"); else { state.selectedRecipeOils = []; setView('oil_recipe_auto'); } };
  window.setView = (v) => { state.view = v; render(); };
  function setTitle(t, p) { pageTitle.textContent = t; stepPill.textContent = p; }
  window.captureResult = (id, n) => { html2canvas(document.getElementById(id),{scale:2}).then(c => { let a=document.createElement('a'); a.download=n+'.png'; a.href=c.toDataURL(); a.click(); }); };

  render();
})();
</script>
</body>
</html>
