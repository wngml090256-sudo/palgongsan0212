<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>티 테라피 (Tea Therapy)</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* [기본 설정 및 모바일 가독성] */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { 
      background: url('./tea.jpeg') no-repeat center center fixed; 
      background-size: cover; 
      color: #333; 
      display: flex; justify-content: center; align-items: center; 
      min-height: 100vh; padding: 40px; /* 모바일 여백 감소 */
      backdrop-filter: blur(2px);
    }
    
    .wrap { width: 100%; max-width: 460px; }
    .card { 
      background: rgba(255, 255, 255, 0.96); 
      border-radius: 24px; 
      padding: 30px; /* 패딩 균형 조정 */
      box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
      min-height: 620px; 
      display: flex; flex-direction: column; 
    }

    /* [헤더 섹션] */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-family: 'Nanum Pen Script', cursive; font-size: 32px; color: #2e7d32; line-height: 1.2; }
    .sub { font-size: 13px; color: #666; word-break: keep-all; }
    .home-btn { font-size: 22px; cursor: pointer; background: none; border: none; padding: 5px; }

    /* [진행바] */
    .pill { display: inline-block; padding: 4px 12px; background: #e8f5e9; color: #2e7d32; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
    .bar { width: 100%; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; margin-bottom: 25px; }
    #barFill { height: 100%; background: #2f8a58; width: 0%; transition: width 0.4s ease; }

    /* [호흡 명상 섹션] */
    .breath-container { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; }
    .guide-text { font-size: 15px; color: #555; line-height: 1.5; margin-bottom: 20px; word-break: keep-all; }
    
    .breath-options { display: flex; gap: 8px; width: 100%; margin-bottom: 25px; }
    .breath-opt-btn { 
      flex: 1; padding: 10px 4px; border-radius: 12px; border: 1.5px solid #eee; 
      background: #fff; font-size: 13px; cursor: pointer; transition: 0.3s;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .breath-opt-btn strong { font-size: 11px; opacity: 0.7; }
    .breath-opt-btn.active.theme-444 { border-color: #7DA2E1; color: #4a7ab5; background: #f0f7ff; }
    .breath-opt-btn.active.theme-478 { border-color: #8CCB9B; color: #2e7d32; background: #f0fffb; }
    .breath-opt-btn.active.theme-448 { border-color: #F8D06B; color: #b8860b; background: #fffdf0; }

    .breath-circle-wrap { height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .breath-circle { 
      width: 130px; height: 130px; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center;
      color: white; font-family: 'Nanum Pen Script', cursive; font-size: 22px;
      transition: box-shadow 0.1s linear, background-color 0.5s ease;
    }

    /* [공통 버튼] */
    .btn { 
      width: 100%; padding: 16px; border-radius: 16px; border: none; 
      font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; 
    }
    .btn-next { 
      margin-top: 15px; background: #fff; border: 1.5px dashed #ccc; 
      padding: 12px; border-radius: 15px; font-size: 14px; 
    }

    /* [바디 스캐너 섹션] */
    .scanner-layout { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .scanner-left { flex: 0 0 160px; position: relative; }
    .body-svg { width: 100%; height: auto; }
    .scanner-right { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .part-btn { 
      background: #fff; border: 1px solid #ddd; padding: 12px 10px; 
      border-radius: 12px; font-size: 13px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }
    .part-btn.active { background: #2f8a58; color: #fff; border-color: #2f8a58; }
    .hlt { opacity: 0; fill: rgba(47, 138, 88, 0.3); stroke: #2f8a58; stroke-width: 3; transition: 0.2s; }
    .hlt.on { opacity: 1; }

    /* [결과 박스] */
    .result-box { 
      background: #fff; border-radius: 20px; padding: 24px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; 
    }
    .reflection-box { 
      background: #f0f4f8; border-radius: 12px; padding: 16px; 
      margin-top: 20px; font-size: 14px; line-height: 1.6; text-align: left;
      border-left: 4px solid #A0BAED; word-break: keep-all;
    }

    .footer { text-align: center; margin-top: auto; padding-top: 20px; color: #aaa; font-size: 10px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card" id="app">
      <header>
        <div class="header-left">
          <h1 id="pageTitle">티 테라피</h1>
          <div class="sub" id="pageSub">나를 돌보는 시간</div>
        </div>
        <button class="home-btn" onclick="location.href='index.html'">🏠</button>
      </header>

      <div class="pill" id="stepPill">Meditation</div>
      <div class="bar"><div id="barFill"></div></div>

      <main id="mainContent" style="flex:1; display:flex; flex-direction:column;"></main>

      <div class="footer">
        <div>© 자연환경해설사 정주희</div>
        <div style="margin-top:4px;">몸과 마음의 소리에 귀를 기울여보세요.</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const THEMES = {
    '444': { color: '#7DA2E1', shadow: 'rgba(125, 162, 225, 0.6)', label: '안정' },
    '478': { color: '#8CCB9B', shadow: 'rgba(140, 203, 155, 0.6)', label: '불면' },
    '448': { color: '#F8D06B', shadow: 'rgba(248, 208, 107, 0.6)', label: '활력' }
  };

  const TEA_DB = {
    head: { label: "머리 / 정신", symptoms: [{ txt: "생각이 많고 머리가 무거운 상태", tea: "박하차", reflection: "차를 한 모금 머금고, 코로 나오는 시원한 바람에 복잡한 생각들을 실어 보내 보세요." }] },
    throat: { label: "목 / 기관지", symptoms: [{ txt: "목이 따갑고 숨쉬기 칼칼한 상태", tea: "도라지차", reflection: "목을 타고 내려가는 차의 부드러움을 느끼며 숨결을 다듬어 보세요." }] },
    upper: { label: "윗배 / 소화", symptoms: [{ txt: "속이 더부룩하고 소화가 안 되는 상태", tea: "매실차", reflection: "내 몸의 순환이 다시 시작되는 감각에 집중해 봅니다." }] },
    lower: { label: "아랫배 / 순환", symptoms: [{ txt: "배가 차갑고 에너지가 맺힌 상태", tea: "생강차", reflection: "아랫배 깊은 곳까지 따뜻한 온기가 전달되는 것을 관찰하세요." }] },
    whole: { label: "전신 / 긴장", symptoms: [{ txt: "온몸이 뻐근하고 긴장이 높은 상태", tea: "대추차", reflection: "어깨의 힘을 빼고 숲의 고요함이 몸 안으로 들어온다고 상상해 보세요." }] }
  };

  let state = { view: 'intro', breathType: '444', isBreathing: false, selectedCategory: null };

  function render() {
    const main = document.getElementById("mainContent");
    const fill = document.getElementById("barFill");

    if (state.view === 'intro') {
      fill.style.width = '10%';
      main.innerHTML = `
        <div class="breath-container">
          <p class="guide-text">편안하게 앉아 호흡 리듬을 선택한 후<br><strong>시작</strong> 버튼을 눌러주세요.</p>
          
          <div class="breath-options">
            <button class="breath-opt-btn theme-444 ${state.breathType==='444'?'active':''}" onclick="setBreath('444')">444 호흡<strong>안정</strong></button>
            <button class="breath-opt-btn theme-478 ${state.breathType==='478'?'active':''}" onclick="setBreath('478')">478 호흡<strong>불면</strong></button>
            <button class="breath-opt-btn theme-448 ${state.breathType==='448'?'active':''}" onclick="setBreath('448')">448 호흡<strong>활력</strong></button>
          </div>

          <div class="breath-circle-wrap">
            <div id="breathCircle" class="breath-circle" 
                 style="background-color:${THEMES[state.breathType].color}; box-shadow: 0 0 10px ${THEMES[state.breathType].shadow};">
                 준비
            </div>
          </div>

          <button id="breathActionBtn" class="btn" style="background-color:${THEMES[state.breathType].color}; color:white;" onclick="toggleBreath()">시작하기</button>
          
          <div id="nextStepArea" style="visibility:hidden; width:100%;">
            <button class="btn-next" style="width:100%; border-color:${THEMES[state.breathType].color}; color:${THEMES[state.breathType].color};" onclick="setView('scanner_parts')">
                <strong>호흡을 마쳤습니다</strong><br>내 몸의 신호 체크하기
            </button>
          </div>
        </div>
      `;
    } 
    else if (state.view === 'scanner_parts') {
      fill.style.width = '50%';
      document.getElementById("pageSub").textContent = "감각 스캐닝";
      main.innerHTML = `
        <div class="scanner-layout">
          <div class="scanner-left">
            <img src="./dambi.png" class="body-svg">
            <svg class="body-svg" viewBox="0 0 200 320" style="position:absolute; top:0; left:0; pointer-events:none;">
                <circle id="hlt-head" class="hlt" cx="130" cy="50" r="40" />
                <rect id="hlt-throat" class="hlt" x="115" y="85" width="30" height="20" rx="5" />
                <rect id="hlt-upper" class="hlt" x="105" y="115" width="50" height="35" rx="8" />
                <rect id="hlt-lower" class="hlt" x="105" y="155" width="50" height="40" rx="8" />
                <ellipse id="hlt-whole" class="hlt" cx="130" cy="110" rx="55" ry="90" />
            </svg>
          </div>
          <div class="scanner-right">
            ${Object.keys(TEA_DB).map(k => `
                <button id="btn-${k}" class="part-btn" onclick="selectPart('${k}')" onmouseenter="setHighlight('${k}',true)" onmouseleave="setHighlight('${k}',false)">
                    ${TEA_DB[k].label} <span style="opacity:0.3;">></span>
                </button>
            `).join('')}
          </div>
        </div>
      `;
    }
    else if (state.view === 'scanner_symptoms') {
        fill.style.width = '80%';
        const data = TEA_DB[state.selectedCategory];
        main.innerHTML = `<div style="margin-top:10px;">${data.symptoms.map((s,i) => `
            <button class="btn" style="background:#fff; border:1px solid #ddd; text-align:left; margin-bottom:12px; font-weight:500; font-size:15px; line-height:1.4;" onclick="showResult(${i})">${s.txt}</button>
        `).join('')}</div>
        <button class="btn" style="margin-top:auto; font-size:14px;" onclick="setView('scanner_parts')">이전으로</button>`;
    }
    else if (state.view === 'result') {
        fill.style.width = '100%';
        const res = state.selectedResult;
        main.innerHTML = `
          <div class="result-box">
            <span style="font-size:11px; color:#2e7d32; font-weight:bold; letter-spacing:1px;">TODAY'S TEA</span>
            <h2 style="font-family:'Nanum Pen Script'; font-size:36px; color:#222; margin:10px 0;">${res.tea}</h2>
            <div class="reflection-box">
              <strong style="display:block; margin-bottom:6px; color:#2e7d32;">🌿 해설사의 성찰 가이드</strong>
              ${res.reflection}
            </div>
          </div>
          <button class="btn" style="margin-top:20px; background:#2e7d32; color:white;" onclick="location.reload()">처음으로 돌아가기</button>
        `;
    }
  }

  /* 로직 함수 동일 */
  window.setBreath = (type) => { if (state.isBreathing) return; state.breathType = type; render(); };
  window.toggleBreath = () => {
    const btn = document.getElementById('breathActionBtn');
    const circle = document.getElementById('breathCircle');
    const nextArea = document.getElementById('nextStepArea');
    if (state.isBreathing) {
      state.isBreathing = false;
      btn.textContent = "다시 시작";
      circle.textContent = "준비";
      circle.style.boxShadow = `0 0 10px ${THEMES[state.breathType].shadow}`;
    } else {
      state.isBreathing = true;
      btn.textContent = "그만하기";
      nextArea.style.visibility = "visible";
      runBreathCycle();
    }
  };

  function runBreathCycle() {
  const circle = document.getElementById('breathCircle');
  const configs = { '444': [4, 4, 4], '478': [4, 7, 8], '448': [4, 4, 8] };
  const [inhale, hold, exhale] = configs[state.breathType];
  const shadowColor = THEMES[state.breathType].shadow;

  function countdown(seconds, label, nextStep) {
    let time = seconds;

    // 처음 표시
    circle.innerHTML = `${label}<br>${time}`;

    const interval = setInterval(() => {
      if (!state.isBreathing) {
        clearInterval(interval);
        return;
      }

      time--;

      if (time > 0) {
        circle.innerHTML = `${label}<br>${time}`;
      } else {
        clearInterval(interval);
        nextStep();
      }
    }, 1000);
  }

  function cycle() {
    if (!state.isBreathing) return;

    // 1️⃣ 들이마시기
    circle.style.transition = `box-shadow ${inhale}s linear`;
    circle.style.boxShadow = `0 0 80px 40px ${shadowColor}`;

    countdown(inhale, "들이마시기", () => {

      // 2️⃣ 멈추기
      circle.style.transition = "none";

      countdown(hold, "멈추기", () => {

        // 3️⃣ 내쉬기
        circle.style.transition = `box-shadow ${exhale}s linear`;
        circle.style.boxShadow = `0 0 10px 0px ${shadowColor}`;

        countdown(exhale, "내쉬기", cycle);

      });

    });
  }

  cycle();
}
  window.setView = (v) => { state.view = v; render(); };
  window.selectPart = (k) => { state.selectedCategory = k; setView('scanner_symptoms'); };
  window.showResult = (i) => { state.selectedResult = TEA_DB[state.selectedCategory].symptoms[i]; setView('result'); };
  window.setHighlight = (key, on) => { 
    const el = document.getElementById('hlt-' + key);
    if(el) el.classList.toggle('on', on);
    const btn = document.getElementById('btn-' + key);
    if(btn) btn.classList.toggle('active', on);
  };

  render();
})();
</script>
</body>
</html>
